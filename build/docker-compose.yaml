services:
  mongodb:
    image: mongo:latest
    container_name: mongodb_fuels
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: go_fuels
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - mongodb_network
  timescale:
    image: timescale/timescaledb-ha:pg18
    container_name: timescaledb_fuels
    restart: unless-stopped
    ports:
      - "6543:5432"
    volumes:
      - timescaledb_data:/var/lib/timescaledb/data
    networks:
      - timescaledb_network
volumes:
  mongodb_data:
  mongodb_config:
  timescaledb_data:
networks:
  mongodb_network:
    driver: bridge
  timescaledb_network:
    driver: bridge