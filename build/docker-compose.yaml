services:
  mongodb:
    image: mongo:latest
    container_name: mongodb_fuels
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: go_fuels
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - mongodb_network
  timescale:
    image: timescale/timescaledb-ha:pg18
    container_name: timescaledb_fuels
    restart: unless-stopped
    ports:
      - "6543:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: mysecretpassword
      POSTGRES_DB: postgres
    volumes:
      - timescaledb_data:/var/lib/timescaledb/data
    networks:
      - timescaledb_network
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq_fuels
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - rabbitmq_network
volumes:
  mongodb_data:
  mongodb_config:
  timescaledb_data:
  rabbitmq_data:
networks:
  mongodb_network:
    driver: bridge
  timescaledb_network:
    driver: bridge
  rabbitmq_network:
    driver: bridge